services:
  # One compromised CT log = two CompactLog instances sharing the same keypair.
  # "attack" is served to the victim (external IP via Caddy).
  # "public" is served to monitors (localhost via Caddy).
  #
  # Spin up two logs with:
  #   LOG_KEY_NAME=log-a docker compose -p log-a up -d
  #   LOG_KEY_NAME=log-b docker compose -p log-b up -d

  attack:
    build: ./compact-log
    environment:
      LOG_KEY_NAME: ${LOG_KEY_NAME:?LOG_KEY_NAME is required}
    volumes:
      - ./keys:/app/certs:ro
      - attack-data:/data
    expose:
      - "8080"

  public:
    build: ./compact-log
    environment:
      LOG_KEY_NAME: ${LOG_KEY_NAME:?LOG_KEY_NAME is required}
    volumes:
      - ./keys:/app/certs:ro
      - public-data:/data
    expose:
      - "8080"

volumes:
  attack-data:
  public-data:
