services:
  # One compromised CT log = two CompactLog instances sharing the same keypair.
  # "attack" is served to the victim (external IP via Caddy).
  # "public" is served to monitors (localhost via Caddy).
  #
  # Start up two logs with:
  #   LOG_KEY_NAME=log-a ATTACK_PORT=8081 PUBLIC_PORT=8082 docker compose -p log-a up -d
  #   LOG_KEY_NAME=log-b ATTACK_PORT=8083 PUBLIC_PORT=8084 docker compose -p log-b up -d

  attack:
    build: ./compact-log
    environment:
      LOG_KEY_NAME: ${LOG_KEY_NAME:?LOG_KEY_NAME is required}
    volumes:
      - ./keys:/app/certs:ro
      - attack-data:/data
    ports:
      - "127.0.0.1:${ATTACK_PORT:?ATTACK_PORT is required}:8080"

  public:
    build: ./compact-log
    environment:
      LOG_KEY_NAME: ${LOG_KEY_NAME:?LOG_KEY_NAME is required}
    volumes:
      - ./keys:/app/certs:ro
      - public-data:/data
    ports:
      - "127.0.0.1:${PUBLIC_PORT:?PUBLIC_PORT is required}:8080"

volumes:
  attack-data:
  public-data:
